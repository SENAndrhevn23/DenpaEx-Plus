name: Main

on: workflow_dispatch

jobs:
Windows:
runs-on: windows-latest
steps:
- uses: actions/checkout@v4

```
  - uses: krdlab/setup-haxe@v1
    with:
      haxe-version: 4.3.6

  - name: Install Libraries
    run: |
      haxelib install hmm --quiet
      haxelib run hmm install --quiet

  - name: Compile (Crash Handler)
    run: cd crshhndlr && haxelib run lime build windows

  - name: Compile (DenpaEx)
    run: haxelib run lime build windows

  - uses: actions/upload-artifact@v4
    with:
      name: windowsBuild
      path: export/release/windows/bin/*
      if-no-files-found: error
```

Linux:
runs-on: ubuntu-22.04
steps:
- uses: actions/checkout@v4

```
  - uses: krdlab/setup-haxe@v1
    with:
      haxe-version: 4.3.6

  - name: Install Dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y libvlc-dev libvlccore-dev

  - name: Install Haxe Libraries
    run: |
      haxelib install hmm --quiet
      haxelib run hmm install --quiet

  # 🔥 FIX: remove broken bundled VLC from hxCodec
  - name: Fix hxCodec (Linux VLC issue)
    run: rm -rf ~/.haxelib/hxCodec/*/lib/vlc/lib/Linux

  - name: Compile
    run: haxelib run lime build linux

  - uses: actions/upload-artifact@v4
    with:
      name: linuxBuild
      path: export/release/linux/bin/*
      if-no-files-found: error
```

