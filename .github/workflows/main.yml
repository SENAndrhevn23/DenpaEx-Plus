name: Main

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib run hmm install --quiet

      - name: Build Crash Handler
        run: |
          cd crshhndlr
          haxelib run lime build windows
          cd ..

      - name: Build Main Game
        run: haxelib run lime build windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: export/release/windows/bin
          if-no-files-found: error

  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib run hmm install --quiet

      - name: Fix hxCodec (Linux Linker Error)
        # This removes the corrupted/incompatible libs bundled with hxCodec
        run: rm -rf .haxelib/hxCodec/*/lib/vlc/lib/Linux

      - name: Build Crash Handler
        run: |
          cd crshhndlr
          haxelib run lime build linux
          cd ..

      - name: Build Main Game
        run: haxelib run lime build linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: export/release/linux/bin
          if-no-files-found: error
