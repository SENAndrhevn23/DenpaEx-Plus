name: Main

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib run hmm install --quiet

      - name: Build Crash Handler
        # This is required because of line 91 in your Project.xml
        run: |
          cd crshhndlr
          haxelib run lime build windows
          cd ..

      - name: Build Main Game
        run: haxelib run lime build windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: export/release/windows/bin

  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib run hmm install --quiet

      - name: Fix hxCodec (Symlink System Libs)
        # This fixes the "file format not recognized" / "No such file" error
        run: |
          HXCODEC_PATH=$(haxelib libpath hxCodec | tr -d '\n')
          LIB_PATH="$HXCODEC_PATH/lib/vlc/lib/Linux"
          rm -rf "$LIB_PATH"
          mkdir -p "$LIB_PATH"
          ln -s /usr/lib/x86_64-linux-gnu/libvlc.so.5 "$LIB_PATH/libvlc.so.5"
          ln -s /usr/lib/x86_64-linux-gnu/libvlccore.so.9 "$LIB_PATH/libvlccore.so.9"

      - name: Build Main Game
        # We skip the crash handler here because your Project.xml 
        # only looks for it on Windows (if="CRASH_HANDLER windows").
        run: haxelib run lime build linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: export/release/linux/bin
